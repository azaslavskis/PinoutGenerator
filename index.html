<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinout Generator</title>

    <!-- Styles -->
    <link id="theme-stylesheet" rel="stylesheet" href="styles.css" />

    <!-- Scripts -->
   <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="main.js" defer></script>
</head>
<body>
    <header class="app-header">
        <div class="app-header__content">
            <h1 class="app-title">Pinout Generator</h1>
            <p class="app-subtitle">Design, preview, and export simple pinout diagrams.</p>
        </div>

        <div class="theme-toggle">
            <span>Light</span>
            <label class="switch">
                <input type="checkbox" id="theme-toggle-checkbox" />
                <span class="slider round"></span>
            </label>
            <span>Dark</span>
        </div>
    </header>

    <main class="container">
        <!-- Left: Exportable area (table + diagram) -->
        <section class="panel panel--exportable">
            <div class="panel__inner exportable" id="to_export">
                <h2 class="panel-title">Pin Table</h2>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Label</th>
                                <th>Color</th>
                                <th>Preview</th>
                            </tr>
                        </thead>
                        <tbody id="pin-table-body"></tbody>
                    </table>
                </div>

                <h2 class="panel-title panel-title--compact">Pinout Diagram</h2>
                <div class="diagram-wrapper">
                    <svg id="my-svg" width="800" height="200" aria-label="Pinout diagram"></svg>
                </div>
            </div>
        </section>

        <!-- Right: Pin management -->
        <section class="panel panel--user">
            <div class="panel__inner">
                <h2 class="panel-title">Manage Pins</h2>

                <div class="table-wrapper table-wrapper--input">
                    <table id="myTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Color</th>
                                <th>Label</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="buttons">
                    <button id="add-pin-btn" type="button">Add Pin</button>
                    <button id="generate-btn" type="button">Generate</button>
                    <button id="save-btn" type="button">Save as PNG</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <span>Pinout Generator · 2025</span>
    </footer>
</body>
</html>
